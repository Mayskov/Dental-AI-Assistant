function PanelVoiceNote() {
  const [state, setState] = useState("ready");
  const [seconds, setSeconds] = useState(0);
  const timerRef = useRef(null);
  const fmt = s => String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
  const startRec = () => { setState("recording"); setSeconds(0); timerRef.current = setInterval(() => setSeconds(p => p+1), 1000); };
  const stopRec  = () => { clearInterval(timerRef.current); setState("processing"); };
  useEffect(() => {
    if (state === "processing") { const t = setTimeout(() => setState("done"), 2000); return () => clearTimeout(t); }
  }, [state]);

  return h("div", null,
    h("h3", { style:{ fontSize:15, fontWeight:700, color:"#f8fafc", margin:"0 0 14px 0" } }, "🎤 Голосовая заметка"),
    h("div", { style:{ fontSize:12, color:"#94a3b8", marginBottom:4 } }, "Пациент:"),
    h("div", { style:{ fontSize:14, fontWeight:600, color:"#f8fafc", marginBottom:16 } }, "Мурат С. · Пломба 14 · Сегодня 10:00"),
    state === "ready" && h("div", { style:{ textAlign:"center", padding:24 } },
      h("div", { onClick:startRec, style:{ width:72, height:72, borderRadius:"50%", background:"linear-gradient(135deg,#ef4444,#f472b6)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 12px", cursor:"pointer", fontSize:28 } }, "🎤"),
      h("div", { style:{ fontSize:13, color:"#94a3b8" } }, "Нажмите чтобы начать запись"),
      h("div", { style:{ fontSize:11, color:"#64748b", marginTop:4 } }, "Надиктуйте заметки по приёму")),
    state === "recording" && h("div", { style:{ textAlign:"center", padding:24 } },
      h("div", { onClick:stopRec, style:{ width:72, height:72, borderRadius:"50%", background:"#ef4444", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 12px", cursor:"pointer", fontSize:28, animation:"recording 1.5s infinite" } }, "⏹"),
      h("div", { style:{ fontSize:24, fontWeight:700, color:"#f87171", fontFamily:"monospace", marginBottom:4 } }, fmt(seconds)),
      h("div", { style:{ fontSize:13, color:"#fca5a5" } }, "Запись... Нажмите чтобы остановить")),
    state === "processing" && h("div", { style:{ textAlign:"center", padding:24 } },
      h("div", { style:{ width:72, height:72, borderRadius:"50%", background:"rgba(96,165,250,0.15)", border:"1px solid rgba(96,165,250,0.3)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 12px", fontSize:28 } },
        h("span", { style:{ animation:"pulse 1s infinite" } }, "🤖")),
      h("div", { style:{ fontSize:13, color:"#93c5fd" } }, "AI расшифровывает и структурирует...")),
    state === "done" && h("div", null,
      h("div", { style:{ background:"rgba(16,185,129,0.06)", border:"1px solid rgba(16,185,129,0.15)", borderRadius:10, padding:14, marginBottom:14 } },
        h("div", { style:{ fontSize:11, fontWeight:600, color:"#6ee7b7", marginBottom:8 } }, "✅ AI расшифровал и структурировал запись:"),
        h("div", { style:{ background:"rgba(0,0,0,0.2)", borderRadius:6, padding:10, fontSize:12, color:"#94a3b8", lineHeight:1.6, marginBottom:10, fontStyle:"italic" } },
          '"Мурат, пломба 14 зуб. Убрал кариес, полость средняя. Поставил пломбу композит A2, световая. Прикус проверил, всё хорошо. Контроль через 6 месяцев."'),
        h("div", { style:{ fontSize:12, fontWeight:600, color:"#f8fafc", marginBottom:6 } }, "Структурированная запись:"),
        [["Зуб","14"],["Диагноз","Кариес средний"],["Лечение","Пломба (композит A2, световая)"],["Прикус","Норма"],["Контроль","Через 6 мес"],["Рекомендации","Проф. чистка"]].map((r,i) =>
          h("div", { key:i, style:{ display:"flex", justifyContent:"space-between", padding:"4px 0", borderBottom:i<5?"1px solid rgba(255,255,255,0.04)":"none", fontSize:12 } },
            h("span", { style:{ color:"#64748b" } }, r[0]),
            h("span", { style:{ color:"#e2e8f0", fontWeight:500 } }, r[1])))),
      h("div", { style:{ background:"rgba(96,165,250,0.06)", border:"1px solid rgba(96,165,250,0.12)", borderRadius:8, padding:10, marginBottom:12 } },
        h("div", { style:{ fontSize:11, color:"#93c5fd", fontWeight:600, marginBottom:4 } }, "🤖 AI автоматически:"),
        h("div", { style:{ fontSize:11, color:"#94a3b8", lineHeight:1.7 } }, "✅ Сохранил в историю болезни\n✅ Списал 1 шт Композит A2 со склада\n✅ Создал задачу: пригласить через 6 мес\n✅ Подготовил сводку для пациента")),
      h("div", { style:{ display:"flex", gap:6 } },
        h("div", { style:{ flex:1, textAlign:"center", padding:"8px", borderRadius:6, background:"rgba(16,185,129,0.1)", border:"1px solid rgba(16,185,129,0.15)", color:"#6ee7b7", fontSize:11, fontWeight:600, cursor:"pointer" } }, "📩 Отправить сводку"),

}

function PanelReviews() {

function App() {
  const [role, setRole]               = useState("director");
  const [messages, setMessages]       = useState([]);
  const [input, setInput]             = useState("");
  const [activePanel, setActivePanel] = useState(null);
  const [typing, setTyping]           = useState(false);
  const [showPanel, setShowPanel]     = useState(false);
  const endRef = useRef(null);

  useEffect(() => {
    const r = ROLES.find(r => r.id === role);
    setMessages([{ role:"assistant", text:r.greeting }]);
    setActivePanel(null);
    setShowPanel(false);
  }, [role]);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;

  const [vh, setVh] = useState(window.innerHeight);
  useEffect(() => {
    const onResize = () => setVh(window.innerHeight);
    window.addEventListener("resize", onResize);
    window.visualViewport && window.visualViewport.addEventListener("resize", onResize);
    return () => {
      window.removeEventListener("resize", onResize);
      window.visualViewport && window.visualViewport.removeEventListener("resize", onResize);
    };
  }, []);

  const send = (text) => {
    const q = text || input;
    if (!q.trim()) return;
    setInput("");
    setMessages(p => [...p, { role:"user", text:q }]);
    setTyping(true);
    setActivePanel(null);
    setShowPanel(false);
    const convo = CONVOS[role]?.[q];
    setTimeout(() => {
      setTyping(false);
      if (convo) {
        setMessages(p => [...p, { role:"assistant", text:convo.text }]);
        if (convo.panel) setTimeout(() => { setActivePanel(convo.panel); setShowPanel(true); }, 250);
      } else {
        setMessages(p => [...p, { role:"assistant", text:"Обрабатываю... (в реальной версии AI ответит на любой вопрос)" }]);
      }
    }, 700 + Math.random()*500);
  };

  const cur = ROLES.find(r => r.id === role);
  const PanelComp = activePanel && PANEL_MAP[activePanel];

  return h("div", { style:{ height: (vh / (isMobile ? 1.35 : 2)) + "px", display:"flex", flexDirection:"column" } },

    // ── Safe area spacer for status bar ──
    h("div", { style:{ background:"#0a0a0f", paddingTop:"calc(env(safe-area-inset-top) + 20px)", flexShrink:0 } }),

    // ── Role bar ──
    h("div", { style:{ padding:"10px 12px", borderBottom:"1px solid #1e293b", display:"flex", alignItems:"center", gap:6, background:"rgba(10,10,15,0.98)", flexShrink:0, overflowX:"auto", WebkitOverflowScrolling:"touch" } },
      h("span", { style:{ fontSize:11, color:"#475569", marginRight:2, flexShrink:0 } }, "Роль:"),
      ROLES.map(r =>
        h("button", { key:r.id, onClick:() => setRole(r.id), style:{ padding:"5px 10px", borderRadius:6, border:role===r.id?"1px solid "+r.color:"1px solid #1e293b", background:role===r.id?r.color+"18":"transparent", color:role===r.id?r.color:"#64748b", fontSize:11, fontWeight:role===r.id?700:500, cursor:"pointer", transition:"all 0.2s", flexShrink:0, whiteSpace:"nowrap" } },
          r.icon+" "+r.label))),

    h("div", { style:{ flex:1, display:"flex", overflow:"hidden", position:"relative" } },

      // ── Chat column ──
      h("div", { style:{ flex:1, display:"flex", flexDirection:"column", minWidth:0 } },

        // header
        h("div", { style:{ padding:"10px 16px", borderBottom:"1px solid #1e293b", display:"flex", alignItems:"center", gap:8, flexShrink:0 } },
          h("div", { style:{ width:30, height:30, borderRadius:7, background:"linear-gradient(135deg,"+cur.color+","+cur.color+"88)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13 } }, "🦷"),
          h("div", null,
            h("div", { style:{ fontSize:13, fontWeight:700, color:"#f8fafc" } }, "Dental AI OS"),
            h("div", { style:{ fontSize:10, color:"#10b981" } }, "● "+cur.label))),

        // messages
        h("div", { style:{ flex:1, overflow:"auto", padding:"12px 16px" } },
          messages.map((m, i) =>
            h("div", { key:i, style:{ marginBottom:12, display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start" } },
              h("div", { style:{ maxWidth:"82%", padding:"7px 11px", borderRadius:11, background:m.role==="user"?cur.color+"20":"rgba(255,255,255,0.04)", border:"1px solid "+(m.role==="user"?cur.color+"35":"rgba(255,255,255,0.06)"), fontSize:10.5, lineHeight:1.65, color:"#e2e8f0", whiteSpace:"pre-line" } },
                m.text.split("**").map((p, j) => j%2===1 ? h("strong", { key:j, style:{ color:"#f8fafc" } }, p) : p)))),
          typing && h("div", { style:{ marginBottom:12 } },
            h("div", { style:{ display:"inline-block", padding:"9px 13px", borderRadius:11, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", fontSize:13, color:"#64748b" } },
              h("span", { style:{ animation:"pulse 1.5s infinite" } }, "Думаю..."))),
          h("div", { ref:endRef })),

        // scenario chips
        h("div", { style:{ padding:"6px 16px 4px", display:"flex", gap:5, flexWrap:"wrap", flexShrink:0 } },
          (SCENARIOS[role]||[]).map((s, i) =>
            h("button", { key:i, onClick:() => send(s.prompt), style:{ padding:"4px 9px", borderRadius:5, border:"1px solid #1e293b", background:"rgba(255,255,255,0.02)", color:"#94a3b8", fontSize:10, cursor:"pointer", fontWeight:500, whiteSpace:"nowrap" } },
              s.label))),

        // input bar
        h("div", { style:{ padding:"8px 16px", paddingBottom:"max(10px, env(safe-area-inset-bottom))", borderTop:"1px solid #1e293b", flexShrink:0 } },
          h("div", { style:{ display:"flex", gap:6 } },
            h("input", { value:input, onChange:e => setInput(e.target.value), onKeyDown:e => e.key==="Enter" && send(), placeholder:"Спросите что угодно...", style:{ flex:1, padding:"9px 12px", borderRadius:8, border:"1px solid #1e293b", background:"rgba(255,255,255,0.03)", color:"#e2e8f0", fontSize:13, outline:"none" } }),
            h("button", { onClick:() => send(), style:{ padding:"9px 14px", borderRadius:8, border:"none", background:"linear-gradient(135deg,"+cur.color+","+cur.color+"aa)", color:"#0a0a0f", fontSize:13, fontWeight:700, cursor:"pointer" } }, "↑")))),

      // ── Side panel (desktop: sidebar, mobile: overlay) ──
      PanelComp && h("div", { style:{ width: isMobile ? "100%" : 380, background:"#0f1019", borderLeft: isMobile ? "none" : "1px solid #1e293b", display:"flex", flexDirection:"column", animation:"slideIn 0.25s ease", flexShrink:0, position: isMobile ? "absolute" : "relative", top:0, right:0, bottom:0, zIndex:10 } },
        h("div", { style:{ padding:"8px 14px", borderBottom:"1px solid #1e293b", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 } },
          h("span", { style:{ fontSize:10, color:"#64748b", fontWeight:600, textTransform:"uppercase", letterSpacing:1 } }, "Панель"),
          h("button", { onClick:() => setActivePanel(null), style:{ background:"none", border:"none", color:"#475569", fontSize:45, cursor:"pointer", padding:"8px 16px", lineHeight:1 } }, "✕")),
        h("div", { style:{ flex:1, overflow:"auto", padding:14 } },
          h(PanelComp, { role })))));
}

ReactDOM.render(h(App, null), document.getElementById("root"));
</script>
